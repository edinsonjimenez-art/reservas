{% extends 'base.html' %}

{% block contenido %}

<style>

    .form-section{
        width:100%;
        min-height:80vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:50px 20px;
    }

    .form-container{
        width:100%;
        max-width:650px;
        background:white;
        padding:40px;
        border-radius:22px;
        box-shadow:0 10px 35px rgba(0,0,0,0.12);
    }

    .form-container h1{
        text-align:center;
        margin-bottom:30px;
        color:#111;
        font-size:34px;
    }

    .form-group{
        margin-bottom:22px;
    }

    .form-group label{
        display:block;
        margin-bottom:8px;
        font-weight:bold;
        color:#222;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
        width:100%;
        padding:14px;
        border:1px solid #ccc;
        border-radius:10px;
        font-size:15px;
        transition:0.3s;
    }

    .form-group input:focus,
    .form-group select:focus{
        border-color:#38bdf8;
        outline:none;
        box-shadow:0 0 10px rgba(56,189,248,0.2);
    }

    .btn-guardar{
        width:100%;
        background:#0f172a;
        color:white;
        padding:15px;
        border:none;
        border-radius:10px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    .btn-guardar:hover{
        background:#111827;
    }

</style>

<section class="form-section">

    <div class="form-container">

        <h1>Registrar Habitación</h1>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-group">
                <label>Número</label>
                {{ form.numero }}
            </div>

            <div class="form-group">
                <label>Tipo</label>
                {{ form.tipo }}
            </div>

            <div class="form-group">
                <label>Precio</label>
                {{ form.precio }}
            </div>

            <div class="form-group">
                <label>Imagen</label>
                {{ form.imagen }}
            </div>

            <div class="form-group">
                <label>Estado</label>
                {{ form.estado }}
            </div>

            <button type="submit" class="btn-guardar">
                Guardar Habitación
            </button>

        </form>

    </div>

</section>

{% endblock %}
